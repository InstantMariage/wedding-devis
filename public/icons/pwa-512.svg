<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec"/>
      <stop offset="100%" style="stop-color:#fdf9ec"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6b332"/>
      <stop offset="50%" style="stop-color:#d4981a"/>
      <stop offset="100%" style="stop-color:#edc85b"/>
    </linearGradient>
    <linearGradient id="heart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Decorative border -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>

  <!-- Wedding rings (interlocked) -->
  <!-- Left ring -->
  <circle cx="196" cy="248" r="72" fill="none" stroke="url(#ring)" stroke-width="22"/>
  <!-- Right ring -->
  <circle cx="316" cy="248" r="72" fill="none" stroke="url(#ring)" stroke-width="22"/>

  <!-- Overlap mask: right ring over left at intersection -->
  <!-- White arc to create interlock illusion -->
  <path d="M256,184 A72,72 0 0,1 256,312" fill="none" stroke="#fdf9ec" stroke-width="26"/>
  <path d="M256,195 A72,72 0 0,0 256,301" fill="none" stroke="url(#ring)" stroke-width="22"/>

  <!-- Heart above rings -->
  <path d="M256,160
    C256,160 230,130 210,130
    C188,130 172,148 172,168
    C172,200 210,224 256,256
    C302,224 340,200 340,168
    C340,148 324,130 302,130
    C282,130 256,160 256,160Z"
    fill="url(#heart)" opacity="0.9"/>

  <!-- Small sparkle decorations -->
  <g fill="#d4981a" opacity="0.8">
    <polygon points="100,120 104,132 116,132 107,139 110,151 100,144 90,151 93,139 84,132 96,132" />
    <polygon points="412,120 415,129 424,129 417,134 419,143 412,138 405,143 407,134 400,129 409,129" transform="scale(0.8) translate(102,40)"/>
    <polygon points="412,360 415,369 424,369 417,374 419,383 412,378 405,383 407,374 400,369 409,369" transform="scale(0.7) translate(178,155)"/>
  </g>

  <!-- App name -->
  <text x="256" y="365" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#b87b14" letter-spacing="2">Devis Pro</text>
  <text x="256" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#ec4899" letter-spacing="4">MARIAGE</text>
</svg>
